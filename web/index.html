<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictover - Minimalist Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Background Checkerboard CSS thuần - Chuẩn mẫu tối */
            background-color: #121212;
            background-image:
                linear-gradient(45deg, #181818 25%, transparent 25%),
                linear-gradient(-45deg, #181818 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #181818 75%),
                linear-gradient(-45deg, transparent 75%, #181818 75%);
            background-size: 32px 32px;
            background-position: 0 0, 0 16px, 16px -16px, -16px 0px;
            color: #37352F;
            overflow: hidden;
            height: 100vh;
        }

        .notion-sidebar-bg {
            background-color: #F7F7F5;
        }

        .notion-border {
            border: 1px solid #EDECE9;
        }

        .card-shadow {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .compact-gap {
            gap: 0.75rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 28px;
            height: 16px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #E1E1E0;
            transition: .2s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #238356;
        }

        input:checked+.slider:before {
            transform: translateX(12px);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
        }

        .gif-container {
            cursor: zoom-in;
            transition: all 0.3s ease;
            height: 100%;
        }

        .gif-container:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Fix lỗi hiển thị 1 khung: dùng height 100% thay vì 100vh */
        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

    <!-- Fullscreen Modal -->
    <div id="videoModal" class="modal flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-4xl rounded-2xl shadow-2xl notion-border overflow-hidden">
            <div class="px-5 py-3 bg-zinc-50 border-b border-zinc-100 flex justify-between items-center">
                <span id="videoTitle" class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest text-black">Preview Content</span>
                <button onclick="closeModal()" class="text-zinc-400 hover:text-black transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="modalBody" class="aspect-video bg-[#050505] flex items-center justify-center"></div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('videoModal');
        const title = document.getElementById('videoTitle');
        const body = document.getElementById('modalBody');

        function openModal(name) {
            title.innerText = `Hướng dẫn: ${name}`;
            body.innerHTML = `
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center mb-3">
                        <svg class="w-6 h-6 text-emerald-500 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                    </div>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Video Tutorial Placeholder</p>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function openFullscreen(src, name) {
            title.innerText = `Phóng to: ${name}`;
            body.innerHTML = `<img src="${src}" class="w-full h-full object-contain">`;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            body.innerHTML = '';
        }

        window.onclick = function (e) { if (e.target == modal) closeModal(); }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Background Checkerboard CSS thuần - Chuẩn mẫu tối */
            background-color: #121212;
            background-image:
                linear-gradient(45deg, #181818 25%, transparent 25%),
                linear-gradient(-45deg, #181818 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #181818 75%),
                linear-gradient(-45deg, transparent 75%, #181818 75%);
            background-size: 32px 32px;
            background-position: 0 0, 0 16px, 16px -16px, -16px 0px;
            color: #37352F;
            overflow: hidden;
            height: 100dvh;
        }

        .notion-sidebar-bg {
            background-color: #F7F7F5;
        }

        .notion-border {
            border: 1px solid #EDECE9;
        }

        .card-shadow {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .compact-gap {
            gap: 0.75rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 28px;
            height: 16px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #E1E1E0;
            transition: .2s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #238356;
        }

        input:checked+.slider:before {
            transform: translateX(12px);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
        }

        .gif-container {
            cursor: pointer;
            transition: all 0.3s ease;
            height: 100%;
        }

        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #0b0b0b;
            border: none;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .video-overlay-icon {
            width: 52px;
            height: 52px;
            border-radius: 9999px;
            border: none;
            background: rgba(0, 0, 0, 0.62);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
        }

        .video-overlay-icon svg {
            width: 22px;
            height: 22px;
            margin-left: 2px;
        }

        .gif-container.is-playing .video-overlay {
            opacity: 0;
        }

        .home-main {
            min-height: 0;
            overflow: hidden;
            padding-bottom: 0;
        }

        .home-main>* {
            min-height: 0;
        }

        .home-settings {
            min-height: 0;
            overflow: hidden;
        }

        /* Fix lỗi hiển thị 1 khung: dùng height 100% thay vì 100vh */
        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 1024px) {
            body {
                height: auto;
                min-height: 100dvh;
                overflow: auto;
            }

            .home-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
                margin-bottom: 1rem;
                padding: 0;
            }

            .home-nav {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                width: 100%;
                gap: 0.75rem;
                align-items: stretch;
            }

            .home-nav>a {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100%;
                min-width: 0;
                padding: 0.45rem 0.7rem;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 0.55rem;
                background: rgba(255, 255, 255, 0.04);
            }

            .home-nav> :not([hidden])~ :not([hidden]) {
                margin-left: 0 !important;
                margin-right: 0 !important;
            }

            .home-nav .home-divider {
                display: none;
            }

            .home-main {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
                overflow: visible;
                padding-bottom: 0.75rem;
            }

            .home-media {
                display: grid;
                grid-template-columns: 1fr;
                gap: 0.75rem;
                height: auto;
            }

            .home-media>.gif-container {
                min-height: 180px;
                max-height: 220px;
            }

            .home-settings {
                width: 100%;
            }

            .settings-grid {
                grid-template-columns: 1fr !important;
            }

            .home-settings .grid-cols-3 {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
            }

            .home-settings input,
            .home-settings select,
            .home-settings textarea,
            .home-settings button {
                font-size: 1rem !important;
            }
        }

        @media (max-width: 768px) {
            body {
                height: 100dvh;
                min-height: 100dvh;
                overflow: hidden;
                padding: 0.7rem !important;
            }

            .home-header {
                margin-bottom: 0.65rem !important;
                gap: 0.55rem;
            }

            .home-nav {
                gap: 0.45rem;
            }

            .home-nav>a {
                padding: 0.45rem 0.35rem;
                font-size: 0.72rem;
                line-height: 1.1;
                white-space: nowrap;
            }

            .home-main {
                display: block !important;
                overflow: hidden !important;
                padding-bottom: 0 !important;
            }

            .home-settings {
                display: none !important;
            }

            .home-media {
                width: 100%;
                height: 100%;
                display: grid;
                grid-template-rows: repeat(3, minmax(0, 1fr));
                gap: 0.55rem;
            }

            .home-media>.gif-container {
                min-height: 0;
                max-height: none;
            }
        }
    </style>
</head>

        </div>
    </main>

    <script>
        const RELEASE_BASE = 'https://github.com/langochungdev/dictover-desktop/releases';

        function parseVersion(value) {
            if (typeof value !== 'string') {
                return '';
            }
            const normalized = value.trim();
            return /^\d+\.\d+\.\d+$/.test(normalized) ? normalized : '';
        }

        async function applyVersionFallback(link) {
            try {
                const response = await fetch('/version.json', { cache: 'no-store' });
                if (!response.ok) {
                    link.href = `${RELEASE_BASE}/latest`;
                    return;
                }

                const payload = await response.json();
                const version = parseVersion(payload?.version);
                if (!version) {
                    link.href = `${RELEASE_BASE}/latest`;
                    return;
                }

                link.href = `${RELEASE_BASE}/download/v${version}/DictOver-${version}.zip`;
            } catch {
                link.href = `${RELEASE_BASE}/latest`;
            }
        }

        async function resolveLatestDownloadLink() {
            const link = document.getElementById('downloadLink');
            if (!link) {
                return;
            }

            await applyVersionFallback(link);
        }

        void resolveLatestDownloadLink();

        const videoFrames = Array.from(document.querySelectorAll('[data-video-frame]'));

        function stopFrame(frame) {
            const video = frame.querySelector('video');
            if (!video) {
                return;
            }

            video.pause();
            try {
                video.currentTime = 0;
            } catch {
                video.load();
            }
            frame.classList.remove('is-playing');
        }

        videoFrames.forEach((frame) => {
            const video = frame.querySelector('video');
            if (!video) {
                return;
            }

            video.controls = false;

            frame.addEventListener('click', () => {
                if (frame.classList.contains('is-playing')) {
                    stopFrame(frame);
                    return;
                }

                videoFrames.forEach((other) => {
                    if (other !== frame) {
                        stopFrame(other);
                    }
                });

                frame.classList.add('is-playing');

                const playResult = video.play();
                if (playResult && typeof playResult.then === 'function') {
                    void playResult.catch(() => {
                        frame.classList.remove('is-playing');
                        stopFrame(frame);
                    });
                }
            });

            video.addEventListener('ended', () => {
                stopFrame(frame);
            });
        });
    </script>
</body>

</html>
